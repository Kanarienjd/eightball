<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Eight Ball: Reel Rumble</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="960" height="540" aria-label="Eight Ball: Reel Rumble"></canvas>

      <div class="hud" aria-hidden="true">
        <div>
          <span class="label">Герой</span>
          <span id="playerHp">100</span>
        </div>
        <div>
          <span class="label">Враг</span>
          <span id="bossHp">100</span>
        </div>
        <div>
          <span class="label">Локация</span>
          <span id="stageName">Синий зал</span>
        </div>
      </div>

      <div class="intro" id="intro">
        <h1>Eight Ball: Reel Rumble</h1>
        <p>Иди слева направо по жёлтому залу, перепрыгивай врагов, победи пять противников и подготовься к ритм-битве с боссом.</p>
        <button id="startButton">Играть</button>
      </div>

      <div class="touch-controls" aria-label="Управление">
        <div class="pad">
          <button data-key="left" aria-label="Влево">‹</button>
          <button data-key="right" aria-label="Вправо">›</button>
        </div>
        <div class="actions">
          <button data-key="power" aria-label="Усиление">✦</button>
          <button data-key="attack" aria-label="Атака">●</button>
          <button data-key="jump" aria-label="Прыжок">↥</button>
        </div>
      </div>
    </main>

    <script src="game.js"></script>
  </body>
</html>
